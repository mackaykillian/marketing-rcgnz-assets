# Netlify build configuration for marketing-rcgnz-assets
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 8 requires Node 20.19+/22.12+; pin to a Netlify-supported LTS.
  NODE_VERSION = "22"

# Single-page app: serve index.html for any route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
